app = "richlaconte-tool"
primary_region = "iad"
kill_signal = "SIGINT"
kill_timeout = "5s"

[build]
  dockerfile = "Dockerfile"

[env]
  NODE_ENV = "production"
  HOSTNAME = "0.0.0.0"
  PORT = "3000"
  TOOL_DATABASE_PATH = "/data/tool.sqlite"
  TOOL_YJS_DATABASE_PATH = "/data/collaboration.sqlite"
  TOOL_ALLOWED_ORIGINS = "https://richlaconte-tool.fly.dev"

[mounts]
  source = "tool_data"
  destination = "/data"
  snapshot_retention = 7

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "10s"
    method = "GET"
    path = "/api/health"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory = "1gb"
