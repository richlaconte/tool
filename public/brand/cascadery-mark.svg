<svg width="128" height="128" viewBox="0 0 128 128" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Cascadery">
  <!-- Three Areas cascading down-and-right: the CSS cascade as stacked canvas Areas -->
  <rect x="12" y="12" width="64" height="64" rx="17" fill="#4F46E5" stroke="#FFFFFF" stroke-width="2.5"/>
  <rect x="32" y="32" width="64" height="64" rx="17" fill="#3B82F6" stroke="#FFFFFF" stroke-width="2.5"/>
  <rect x="52" y="52" width="64" height="64" rx="17" fill="#06B6D4" stroke="#FFFFFF" stroke-width="2.5"/>
  <!-- Slash: nod to the /command styling interaction -->
  <path d="M75 97 L93 71" stroke="#FFFFFF" stroke-width="6" stroke-linecap="round" opacity="0.92"/>
</svg>
